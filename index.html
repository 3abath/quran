<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المصحف الشريف – تلاوة وفضائل السور</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* All styles unchanged from previous version */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg: #f8f5f0;
            --surface: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --primary: #0f766e;
            --primary-light: #ccf2ef;
            --gold: #b8860b;
            --border: #e2e8f0;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            --radius: 20px;
            --font-ui: 'Cairo', sans-serif;
            --font-quran: 'Amiri Quran', serif;
            --player-height: 80px;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-ui);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        button, input {
            font-family: inherit;
            background: none;
            border: none;
            color: inherit;
        }
        input:focus {
            outline: none;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 2rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            height: 68px;
            flex-shrink: 0;
            gap: 0.75rem;
            z-index: 10;
            flex-wrap: wrap;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .logo i { font-size: 1.4rem; }
        .search-bar {
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 0.35rem 1.2rem;
            flex: 1 1 320px;
            max-width: 480px;
        }
        .search-bar i { color: var(--text-muted); font-size: 0.95rem; }
        .search-bar input {
            width: 100%;
            padding: 0.45rem 0.7rem;
            font-size: 0.95rem;
            background: transparent;
        }
        .header-actions {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }
        .header-actions i {
            font-size: 1.2rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.3rem;
            border-radius: 50%;
            transition: 0.15s;
        }
        .header-actions i:hover {
            background: var(--primary-light);
            color: var(--primary);
        }
        main {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .view {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            display: none;
            padding: 1.5rem 2rem;
            padding-bottom: calc(var(--player-height) + 20px);
        }
        .view.active { display: block; }
        .accueil-wrap { max-width: 1100px; margin: 0 auto; }
        .hero {
            text-align: center;
            padding: 2rem 0 2.5rem;
        }
        .hero h1 {
            font-size: 2.2rem;
            color: var(--primary);
        }
        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 0.3rem;
        }
        .search-center {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 0.6rem 1.8rem;
            display: flex;
            align-items: center;
            max-width: 640px;
            margin: 0 auto 2.5rem;
        }
        .search-center i { color: var(--text-muted); }
        .search-center input {
            width: 100%;
            font-size: 1.05rem;
            padding: 0.5rem 1rem;
            background: transparent;
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            border-bottom: 3px solid var(--primary);
            display: inline-block;
            padding-bottom: 0.3rem;
            margin-bottom: 1.5rem;
        }
        .surah-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 0.8rem;
        }
        .surah-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.6rem 0.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.15s;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .surah-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }
        .surah-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            flex: 1;
            min-width: 140px;
        }
        .surah-info .num {
            background: var(--bg);
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .surah-info .name {
            font-family: var(--font-quran);
            font-size: 1.15rem;
            font-weight: 600;
        }
        .surah-info .meta {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-right: auto;
        }
        .btn-group {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .btn-sm {
            padding: 0.3rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .btn-benefits {
            background: var(--primary-light);
            color: var(--primary);
        }
        .btn-benefits:hover {
            background: var(--primary);
            color: #fff;
        }
        .btn-play {
            background: #1a1a2e;
            color: #fff;
        }
        .btn-play:hover {
            background: #0f766e;
            transform: scale(1.05);
        }
        .btn-play.playing {
            background: #b91c1c;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .lecture-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100%;
            gap: 0;
        }
        .sidebar {
            background: var(--surface);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            padding: 0.8rem 0.5rem;
            height: 100%;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
        .surah-nav-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0.9rem;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.12s;
            font-size: 0.95rem;
            align-items: center;
        }
        .surah-nav-item:hover {
            background: var(--primary-light);
            color: var(--primary);
        }
        .surah-nav-item.active {
            background: var(--primary);
            color: #fff;
            font-weight: 600;
        }
        .surah-nav-item .nav-play {
            font-size: 0.8rem;
            cursor: pointer;
            padding: 0 0.3rem;
            opacity: 0.7;
        }
        .surah-nav-item .nav-play:hover {
            opacity: 1;
            color: var(--gold);
        }

        .quran-area {
            overflow-y: auto;
            padding: 2rem 2.8rem;
            height: 100%;
            direction: rtl;
            background: var(--bg);
            padding-bottom: calc(var(--player-height) + 20px);
        }
        .quran-area::-webkit-scrollbar { width: 6px; }
        .quran-area::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .surah-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .surah-header .left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .surah-header h2 {
            font-family: var(--font-quran);
            font-size: 2rem;
            color: var(--primary);
        }
        .surah-header .btn-group-lg {
            display: flex;
            gap: 0.6rem;
        }
        .btn-lg {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.95rem;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-lg.benefits {
            background: var(--primary-light);
            color: var(--primary);
        }
        .btn-lg.benefits:hover {
            background: var(--primary);
            color: #fff;
        }
        .btn-lg.play {
            background: #1a1a2e;
            color: #fff;
        }
        .btn-lg.play:hover {
            background: #0f766e;
        }
        .btn-lg.play.playing {
            background: #b91c1c;
            animation: pulse 1s infinite;
        }

        .bismillah {
            font-family: var(--font-quran);
            font-size: 2.6rem;
            text-align: center;
            color: var(--primary);
            margin-bottom: 2rem;
            opacity: 0.7;
        }
        .verse-text {
            font-family: var(--font-quran);
            font-size: 2.1rem;
            line-height: 3.2rem;
            padding: 0 3px;
            border-radius: 6px;
            display: inline;
        }
        .verse-number {
            font-family: var(--font-ui);
            font-size: 0.8rem;
            color: var(--gold);
            font-weight: 700;
            margin: 0 0.25rem;
            display: inline-block;
        }
        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .loading-spinner i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* Player Bar */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--player-height);
            background: #0f0f0f;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            border-top: 2px solid var(--primary);
            padding: 0 1rem;
        }
        .player-bar.active {
            display: flex;
        }
        .player-bar .player-wrapper {
            width: 100%;
            max-width: 800px;
            height: 100%;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: relative;
        }
        .player-bar .player-wrapper #playerContainer {
            width: 120px;
            height: 68px;
            flex-shrink: 0;
            border-radius: 6px;
            overflow: hidden;
            background: #000;
            border: 1px solid #333;
        }
        .player-bar .player-wrapper #playerContainer iframe {
            width: 100% !important;
            height: 100% !important;
        }
        .player-bar .player-close {
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0.5rem;
            flex-shrink: 0;
        }
        .player-bar .player-close:hover {
            color: #ef4444;
        }
        .player-bar .player-info {
            color: #fff;
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 80px;
            flex-shrink: 0;
        }

        .audio-controls {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex: 1;
            justify-content: center;
        }
        .audio-controls .ctrl-btn {
            color: #fff;
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.15s;
            opacity: 0.8;
        }
        .audio-controls .ctrl-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        .audio-controls .ctrl-btn.playing {
            color: #f59e0b;
            animation: pulse 1s infinite;
        }
        .audio-controls .ctrl-btn.big {
            font-size: 2.4rem;
        }
        .audio-controls .progress-wrap {
            flex: 1;
            min-width: 60px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .audio-controls .progress-wrap .time {
            color: #aaa;
            font-size: 0.7rem;
            font-weight: 300;
            min-width: 36px;
            text-align: center;
        }
        .audio-controls .progress-bar {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }
        .audio-controls .progress-bar .fill {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
            width: 0%;
            transition: width 0.1s;
        }
        .audio-controls .progress-bar .handle {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            left: 0%;
            display: none;
        }
        .audio-controls .progress-bar:hover .handle {
            display: block;
        }

        .search-results-wrap {
            max-width: 800px;
            margin: 0 auto;
        }
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.4rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: 0.15s;
        }
        .result-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }
        .result-card .head {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--primary);
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .result-card .head .result-actions {
            display: flex;
            gap: 0.5rem;
        }
        .result-card .head .result-actions button {
            background: var(--primary-light);
            color: var(--primary);
            padding: 0.1rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 600;
        }
        .result-card .head .result-actions button:hover {
            background: var(--primary);
            color: #fff;
        }
        .result-card .text {
            font-family: var(--font-quran);
            font-size: 1.6rem;
            line-height: 2.4rem;
        }
        .highlight {
            background: #fef3c7;
            color: var(--primary);
            padding: 0 4px;
            border-radius: 4px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--surface);
            border-radius: 28px;
            max-width: 660px;
            width: 100%;
            max-height: 88vh;
            overflow-y: auto;
            padding: 2rem 2.2rem;
            position: relative;
            animation: fadeUp 0.25s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-close {
            position: absolute;
            top: 1.2rem;
            left: 1.5rem;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.15s;
        }
        .modal-close:hover {
            color: var(--text);
            transform: rotate(90deg);
        }
        .modal-title {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.3rem;
            border-right: 4px solid var(--gold);
            padding-right: 1rem;
            margin-bottom: 1.2rem;
        }
        .modal-body {
            font-size: 1.05rem;
            line-height: 2;
            text-align: justify;
            color: #1e293b;
            padding: 0.5rem 0;
        }
        .modal-body .error-text {
            text-align: center;
            padding: 1.5rem;
            color: #b91c1c;
            background: #fee2e2;
            border-radius: 12px;
        }
        .modal-body ul {
            list-style: none;
            padding: 0;
        }
        .modal-body li {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.8rem;
            align-items: baseline;
        }
        .modal-body li i {
            color: var(--gold);
            font-size: 1rem;
            width: 1.5rem;
            text-align: center;
        }
        .modal-body .default-benefits {
            text-align: center;
            padding: 0.5rem 0;
        }
        .modal-body .default-benefits .surah-detail {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
        }
        .modal-body .default-benefits .surah-meta {
            color: var(--text-muted);
            margin: 0.3rem 0;
        }
        .modal-body .default-benefits .separator {
            margin: 1rem 0;
            border: 0;
            border-top: 2px solid var(--border);
        }
        .modal-body .default-benefits .quote {
            font-family: var(--font-quran);
            font-size: 1.4rem;
            color: var(--primary);
            margin: 1rem 0;
            opacity: 0.8;
        }

        body.mode-concentration .sidebar,
        body.mode-concentration header {
            display: none !important;
        }
        body.mode-concentration .lecture-layout {
            grid-template-columns: 1fr;
        }
        body.mode-concentration .quran-area {
            padding: 3rem 3.5rem;
            max-width: 860px;
            margin: 0 auto;
        }
        .focus-btn {
            position: fixed;
            bottom: calc(var(--player-height) + 20px);
            left: 2rem;
            background: var(--primary);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 6px 20px rgba(15,118,118,0.3);
            cursor: pointer;
            z-index: 50;
            transition: 0.2s;
            border: none;
        }
        .focus-btn:hover { transform: scale(1.06); }

        @media (max-width: 820px) {
            .lecture-layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .quran-area { padding: 1.2rem; }
            .verse-text { font-size: 1.6rem; line-height: 2.8rem; }
            .hero h1 { font-size: 1.6rem; }
            header { padding: 0.4rem 1rem; height: auto; gap: 0.4rem; }
            .search-bar { flex: 1 1 200px; min-width: 140px; }
            .modal-box { padding: 1.5rem; margin: 0.5rem; }
            .surah-grid { grid-template-columns: 1fr; }
            .surah-card { flex-wrap: wrap; }
            .btn-group { width: 100%; justify-content: flex-start; }
            .surah-header .left { width: 100%; justify-content: space-between; }
            .surah-header .btn-group-lg { width: 100%; justify-content: flex-start; }
            .player-bar .player-wrapper { flex-wrap: wrap; gap: 0.3rem; }
            .player-bar .player-info { font-size: 0.6rem; min-width: 50px; }
            .player-bar { height: 70px; }
            :root { --player-height: 70px; }
            .focus-btn { bottom: calc(var(--player-height) + 15px); }
            .audio-controls .ctrl-btn { font-size: 1.2rem; }
            .audio-controls .ctrl-btn.big { font-size: 1.8rem; }
            .player-bar .player-wrapper #playerContainer {
                width: 80px;
                height: 50px;
            }
        }
        @media (max-width: 480px) {
            .verse-text { font-size: 1.3rem; line-height: 2.4rem; }
            .quran-area { padding: 0.8rem; }
            .bismillah { font-size: 1.8rem; }
            .surah-header h2 { font-size: 1.5rem; }
            .btn-lg { font-size: 0.75rem; padding: 0.3rem 0.8rem; }
            .surah-card .btn-sm { font-size: 0.6rem; padding: 0.2rem 0.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="goHome()">
            <i class="fa-solid fa-book-quran"></i>
            <span>المصحف الشريف</span>
        </div>
        <div class="search-bar">
            <i class="fa-solid fa-search"></i>
            <input type="text" id="headerSearchInput" placeholder="سورة، 2:255، أو كلمة..." onkeydown="if(event.key==='Enter') doSearch(this.value)" />
        </div>
        <div class="header-actions">
            <i class="fa-solid fa-adjust" onclick="toggleFocus()" title="وضع التركيز"></i>
            <i class="fa-regular fa-clock" onclick="goHome()" title="الرئيسية"></i>
        </div>
    </header>

    <main>
        <div id="view-home" class="view active">
            <div class="accueil-wrap">
                <div class="hero">
                    <h1>🕋 المصحف الشريف</h1>
                    <p>اقرأ القرآن الكريم، واستمع للتلاوة، وتعرف على فضائل كل سورة</p>
                </div>
                <div class="search-center">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="homeSearchInput" placeholder="ابحث عن سورة، آية، أو كلمة..." onkeydown="if(event.key==='Enter') doSearch(this.value)" />
                </div>
                <div class="section-title">فهرس السور</div>
                <div id="homeLoading" class="loading-spinner"><i class="fa-solid fa-spinner fa-pulse"></i> جاري تحميل الفهرس...</div>
                <div class="surah-grid" id="surahGrid"></div>
            </div>
        </div>

        <div id="view-reading" class="view">
            <div class="lecture-layout">
                <aside class="sidebar" id="sidebarNav"></aside>
                <section class="quran-area" id="quranArea">

    <script>
        // ================================================================
        //  فَضَائِلُ السُّوَرِ (Benefits of Surahs) – specific known virtues
        // ================================================================
        const SURAH_BENEFITS = {
            "1": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> هي <strong>أعظم سورة في القرآن</strong>، وهي السبع المثاني، والقرآن العظيم.</li>
                    <li><i class="fa-solid fa-check-circle"></i> <strong>لا تصح صلاة</strong> إلا بقراءة الفاتحة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> هي <strong>رقية</strong> لما روى أبو سعيد الخدري أن النبي صلى الله عليه وسلم قال: «وما يدريك أنها رقية؟».</li>
                    <li><i class="fa-solid fa-check-circle"></i> فيها <strong>شفاء من كل سم</strong> (كما في حديث الدارمي).</li>
                </ul>
            `,
            "2": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> <strong>آية الكرسي</strong> (الآية 255) أعظم آية في القرآن.</li>
                    <li><i class="fa-solid fa-check-circle"></i> قراءة سورة البقرة في البيت <strong>تطرد الشيطان</strong> (رواه مسلم).</li>
                    <li><i class="fa-solid fa-check-circle"></i> <strong>sنام القرآن</strong> وذروته، نزل مع كل آية منها ثمانون ملكاً.</li>
                    <li><i class="fa-solid fa-check-circle"></i> تركها <strong>حسرة</strong>، ولا تستطيعها البطلة (السحرة).</li>
                </ul>
            `,
            "3": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة آل عمران من <strong>الزهراوين</strong> (البقرة وآل عمران) تظلان صاحبهما يوم القيامة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> فيها آية <strong>الاستجابة</strong> (ربنا لا تزغ قلوبنا بعد إذ هديتنا).</li>
                    <li><i class="fa-solid fa-check-circle"></i> كان النبي صلى الله عليه وسلم يقرأ بها في <strong>قيام الليل</strong>.</li>
                </ul>
            `,
            "4": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>النساء</strong> هي سورة الأحكام والحقوق، وبها آية "النساء الصغرى".</li>
                    <li><i class="fa-solid fa-check-circle"></i> تضمنت تفصيل أحكام <strong>المواريث</strong> وحقوق النساء والضعفاء واليتامى.</li>
                </ul>
            `,
            "5": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>المائدة</strong> من أواخر ما نزل من القرآن، وفيها آية إكمال الدين.</li>
                    <li><i class="fa-solid fa-check-circle"></i> امتازت بكثرة النداءات الإيمانية «يا أيها الذين آمنوا» وفصلت أحكام <strong>العقود والحلال والحرام</strong>.</li>
                </ul>
            `,
            "6": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الأنعام</strong> نزلت جملة واحدة ليلاً وشيّعها سبعون ألف ملك.</li>
                    <li><i class="fa-solid fa-check-circle"></i> هي سورة <strong>التوحيد الكبرى</strong> التي ناقشت عقائد المشركين وأقامت الحجة عليهم.</li>
                </ul>
            `,
            "7": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الأعراف</strong> أطول سورة مكية، وتعد كتاباً جامعاً للصراع بين الحق والباطل.</li>
                    <li><i class="fa-solid fa-check-circle"></i> انفردت بذكر قصة <strong>أصحاب الأعراف</strong>، وفصلت قصص الأنبياء مع أقوامهم بشكل بليغ.</li>
                </ul>
            `,
            "8": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الأنفال</strong> هي سورة غزوة بدر الكبرى، وشرعت أحكام الجهاد والغنائم.</li>
                    <li><i class="fa-solid fa-check-circle"></i> وضعت القواعد الربانية <strong>للنصر والتمكين</strong> والثبات عند لقاء الأعداء.</li>
                </ul>
            `,
            "9": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>التوبة</strong> (الفاضحة/المقشقشة) هي السورة الوحيدة التي <strong>لا تبدأ بالبسملة</strong>.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ففضحت المنافقين ونواياهم، وتحدثت عن غزوة تبوك (العسرة) وتوبة الله على الثلاثة الذين خُلفوا.</li>
                </ul>
            `,
            "10": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>يونس</strong> ركزت على قضايا العقيدة، الإيمان بالوحي، والقضاء والقدر.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ذكرت خصوصية <strong>قوم يونس</strong> الذين آمنوا فكشف الله عنهم عذاب الخزي.</li>
                </ul>
            `,
            "11": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>هود</strong> قال عنها النبي صلى الله عليه وسلم: «شيبتني هود وأخواتها».</li>
                    <li><i class="fa-solid fa-check-circle"></i> احتوت على أمر إلهي حازم: <strong>«فاستقم كما أمرت»</strong>، وعرضت عاقبة المكذبين بقوة.</li>
                </ul>
            `,
            "12": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>يوسف</strong> هي <strong>أحسن القصص</strong>، نزلت لتثبيت قلب النبي صلى الله عليه وسلم في عام الحزن.</li>
                    <li><i class="fa-solid fa-check-circle"></i> تبعث الأمل في النفوس وتوضح كيف يتحول الضيق إلى فرج والابتلاء إلى تمكين.</li>
                </ul>
            `,
            "13": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الرعد</strong> توضح قوة الحق وضعف الباطل، وفيها آية: «ألا بذكر الله تطمئن القلوب».</li>
                    <li><i class="fa-solid fa-check-circle"></i> أبرزت مظاهر قدرة الله في الكون وعجائب خلقه كـ <strong>تسبيح الرعد</strong> بحمده والملائكة من خيفته.</li>
                </ul>
            `,
            "14": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>إبراهيم</strong> هدفها إخراج الناس من الظلمات إلى النور، وتضمنت دعاء الخليل إبراهيم عليه السلام.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ضربت المثل بـ <strong>الكلمة الطيبة</strong> كشجرة طيبة، والكلمة الخبيثة كشجرة خبيثة.</li>
                </ul>
            `,
            "15": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الحجر</strong> تضمنت التعهد الإلهي الخالد بحفظ القرآن: <strong>«إنا نحن نزلنا الذكر وإنا له لحافظون»</strong>.</li>
                    <li><i class="fa-solid fa-check-circle"></i> تناولت بداية خلق الإنسان من صلصال، وتوعد إبليس بغواية بني آدم إلا العباد المخلصين.</li>
                </ul>
            `,
            "16": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>النحل</strong> تسمى سورة النِّعم، حيث عددت نعم الله الظاهرة والباطنة على خلقه.</li>
                    <li><i class="fa-solid fa-check-circle"></i> وفيها الآية الجامعة لأصول التشريع الإسلامي: «إن الله يأمر بالعدل والإحسان وإيتاء ذي القربى».</li>
                </ul>
            `,
            "17": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الإسراء</strong> (بنو إسرائيل) تفتتح بتمجيد الله على معجزة الإسراء بالنبي.</li>
                    <li><i class="fa-solid fa-check-circle"></i> كان النبي صلى الله عليه وسلم <strong>لا ينام حتى يقرأها</strong> هي وسورة الزمر كل ليلة.</li>
                </ul>
            `,
            "18": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> من قرأ سورة الكهف في <strong>يوم الجمعة</strong> أضاء له من النور ما بين الجمعتين.</li>
                    <li><i class="fa-solid fa-check-circle"></i> <strong>عشر آيات</strong> من أولها (أو آخرها) عاصمة من <strong>فتنة الدجال</strong>.</li>
                </ul>
            `,
            "19": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>مريم</strong> هي السورة الوحيدة المسمّاة باسم امرأة، وتبرز رحمة الله بعباده (ذِكرُ رحمتِ ربك).</li>
                    <li><i class="fa-solid fa-check-circle"></i> سورة تهز الوجدان ببيان معجزات ولادة يحيى وعيسى عليهما السلام ونفي الولد عن الله جل وعلا.</li>
                </ul>
            `,
            "20": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>طه</strong> كانت سبباً في إسلام عمر بن الخطاب رضي الله عنه لعظمة وجلال آياتها.</li>
                    <li><i class="fa-solid fa-check-circle"></i> افتتحت بـ «ما أنزلنا عليك القرآن لتشقى»، وفصلت رحلة موسى عليه السلام ومناجاته لربه.</li>
                </ul>
            `,
            "21": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الأنبياء</strong> تسمى سورة الاستجابة، لأنها عرضت محن الأنبياء وكيف استجاب الله لهم بعد دعائهم.</li>
                    <li><i class="fa-solid fa-check-circle"></i> اشتملت على دعاء ذي النون: <strong>«لا إله إلا أنت سبحانك إني كنت من الظالمين»</strong> المنجي من الكرب.</li>
                </ul>
            `,
            "22": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الحج</strong> هي السورة الوحيدة التي سميت بركن من أركان الإسلام، وتجمع بين العبادات والمعاملات.</li>
                    <li><i class="fa-solid fa-check-circle"></i> تميزت بوجود <strong>سجدتين</strong> في آياتها، وافتتحت بنداء مرعب يذكر بزلزلة الساعة وأهوالها.</li>
                </ul>
            `,
            "23": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>المؤمنون</strong> افتتحت بـ «قد أفلح المؤمنون» مبيّنة صفاتهم التي تؤهلهم لوراثة الفردوس الأعلى.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ركزت على إثبات البعث والنشور وذكرت أطوار خلق الجنين البشري بدقة إعجازية.</li>
                </ul>
            `,
            "24": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>النور</strong> هي سورة الآداب الاجتماعية وحفظ الأعراض، وفصلت أحكام الاستئذان والحجاب.</li>
                    <li><i class="fa-solid fa-check-circle"></i> تضمنت <strong>آية النور</strong> العظيمة، وبرّأت أم المؤمنين عائشة رضي الله عنها في حادثة الإفك.</li>
                </ul>
            `,
            "25": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الفرقان</strong> نزلت لتثبت صدق القرآن والرسالة، وسميت بـ "الفرقان" لأنه يفرق بين الحق والباطل.</li>
                    <li><i class="fa-solid fa-check-circle"></i> اختتمت بذكر الصفات الإيمانية الراقية لـ <strong>عباد الرحمن</strong> وجزائهم الغُرفة بما صبروا.</li>
                </ul>
            `,
            "26": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الشعراء</strong> ركزت على إبطال مزاعم كفار مكة بأن القرآن شعر أو تنزلت به الشياطين.</li>
                    <li><i class="fa-solid fa-check-circle"></i> تكررت فيها آية: «إن في ذلك لآية وما كان أكثرهم مؤمنين * وإن ربك لهو العزيز الرحيم» عقب قصص الأنبياء.</li>
                </ul>
            `,
            "27": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>النمل</strong> امتازت بذكر نعم الله وتفضيله لداود وسليمان عليهما السلام، وقصة سليمان مع الهدهد وملكة سبأ.</li>
                    <li><i class="fa-solid fa-check-circle"></i> هي السورة الوحيدة التي وردت فيها <strong>البسملة مرتين</strong> (في أولها وفي آية: «إنه من سليمان وإنه بسم الله الرحمن الرحيم»).</li>
                </ul>
            `,
            "28": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>القصص</strong> فصلت نشأة موسى عليه السلام منذ ولادته والتقاط آل فرعون له وحتى تكليفه بالرسالة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ضربت مثلاً لفتنة المال في قصة <strong>قارون</strong> وعاقبة غروره وخسف الأرض به وبداره.</li>
                </ul>
            `,
            "29": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>العنكبوت</strong> محورها الثبات على الإيمان ومواجهة الفتن والابتلاءات: «أحسب الناس أن يتركوا أن يقولوا آمنا وهم لا يفتنون».</li>
                    <li><i class="fa-solid fa-check-circle"></i> شبهت عقيدة الشرك بـ <strong>بيت العنكبوت</strong> في الوهن والضعف.</li>
                </ul>
            `,
            "30": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الروم</strong> تضمنت معجزة غيبية تحققت بدقة بانتصار الروم على الفرس في بضع سنين.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ذكرت <strong>آيات الله الكونية</strong> كخلق الأزواج لتسكنوا إليها، واختلاف الألسنة والألوان.</li>
                </ul>
            `,
            "31": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>لقمان</strong> اشتهرت بالوصايا التربوية العميقة والخالدة التي وجهها لقمان الحكيم لابنه.</li>
                    <li><i class="fa-solid fa-check-circle"></i> اختتمت بـ <strong>مفاتيح الغيب الخمسة</strong> التي لا يعلمها إلا الله (الساعة، الغيث، ما في الأرحام، الكسب، ومكان الموت).</li>
                </ul>
            `,
            "32": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> كان النبي صلى الله عليه وسلم يقرأ سورة السجدة و <strong>هل أتى</strong> في صلاة الفجر يوم الجمعة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> فيها آية <strong>السجدة</strong>، ومن سجدها كان له أجر عظيم.</li>
                </ul>
            `,
            "33": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الأحزاب</strong> تناولت تفاصيل غزوة الخندق (الأحزاب)، ونظمت الأحكام الأسرية لبيت النبوة والأمة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> تضمنت آية <strong>الصلاة على النبي</strong>: «إن الله وملائكته يصلون على النبي...»، وآية حمل الإنسان للأمانة.</li>
                </ul>
            `,
            "34": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>سبأ</strong> افتتحت بالحمد، وناقشت قضية الشكر من خلال نموذجين: داود وسليمان الشاكرين، وقوم سبأ الجاحدين.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ركزت على إبطال شبهات المشركين حول إنكار البعث والحساب.</li>
                </ul>
            `,
            "35": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>فاطر</strong> (الملائكة) تبرز عظمة الله الخالق وتفرده بالخلق والتدبير والرزق: «يا أيها الناس أنتم الفقراء إلى الله».</li>
                    <li><i class="fa-solid fa-check-circle"></i> قسمت الأمة في تعاملها مع الكتاب إلى: ظالم لنفسه، مقتصد، وسابق بالخيرات.</li>
                </ul>
            `,
            "36": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>يس</strong> هي <strong>قلب القرآن</strong>.</li>
                    <li><i class="fa-solid fa-check-circle"></i> من قرأها <strong>ليلة الجمعة</strong> غفر له (رواه الترمذي).</li>
                </ul>
            `,
            "37": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الصافات</strong> هي أول سورة تفتتح بقسم بالملائكة الأبرار، ومحورها حماية التوحيد ودحر الشياطين بالشهب.</li>
                    <li><i class="fa-solid fa-check-circle"></i> فصلت قصة الذبيح إسماعيل عليه السلام، وتتميز بـ <strong>كثرة السلام</strong> فيها على الأنبياء.</li>
                </ul>
            `,
            "38": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>ص</strong> ركزت على قضية الخصومة والعدل، وعرضت قصص الأنبياء (داود وسليمان وأيوب) كأمثلة للصبر والإنابة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> كشفت طبيعة الحوار الذي دار في الملأ الأعلى واعتراض إبليس وسجوده تكبراً.</li>
                </ul>
            `,
            "39": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الزمر</strong> كان النبي صلى الله عليه وسلم يقرأها كل ليلة قبل النوم، وتسمى سورة الإخلاص والتوجيه للعبادة النظيفة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> فيها آية الأمل العظمى: <strong>«يا عبادي الذين أسرفوا على أنفسهم لا تقنطوا من رحمة الله»</strong>، وتنتهي بسوق المؤمنين زُمراً للجنة.</li>
                </ul>
            `,
            "40": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>غافر</strong> (المؤمن) هي أولى سور <strong>الحواميم</strong> السبعة (التي تبدأ بـ "حم")، والتي تسمى "ديباج القرآن".</li>
                    <li><i class="fa-solid fa-check-circle"></i> انفردت بذكر قصة "مؤمن آل فرعون" الذي كتم إيمانه ودافع عن موسى عليه السلام.</li>
                </ul>
            `,
            "41": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>فصلت</strong> (حم السجدة) سورة دعوية واجهت صناديد قريش، وفيها خرّ عتبة بن ربيعة ساجداً عند سماعها.</li>
                    <li><i class="fa-solid fa-check-circle"></i> وصفت القرآن بأنه: «كتاب أحكمت آياته ثم فصلت من لدن حكيم خبير»، وبينت ثبات مستقيمي الطريقة عند الموت.</li>
                </ul>
            `,
            "42": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الشورى</strong> وضعت المبدأ الإسلامي الأصيل في إدارة شؤون المجتمع والدولة: <strong>«وأمرهم شورى بينهم»</strong>.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ركزت على وحدة الدين وتشريعات الأنبياء جميعاً، وبيان صور الوحي الإلهي للبشر.</li>
                </ul>
            `,
            "43": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الزخرف</strong> حاربت المقاييس المادية الزائفة لأهل الدنيا الذين جعلوا الزخرف والذهب معياراً للأفضيلية.</li>
                    <li><i class="fa-solid fa-check-circle"></i> قررت الحقيقة الخالدة: «الأخلاء يومئذ بعضهم لبعض عدو إلا المتقين».</li>
                </ul>
            `,
            "44": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الدخان</strong> تحدثت عن نزول القرآن في ليلة مباركة (ليلة القدر)، وعن آية الدخان التي تصيب المكذبين.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ورد في بعض الآثار الضعيفة فضل قراءتها ليلاً لاستغفار الملائكة، وتناولت هلاك فرعون وجنوده وبكاء السماء.</li>
                </ul>
            `,
            "45": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الجاثية</strong> سميت بذلك لعرضها مشهداً رهيباً من مشاهد القيامة حيث تجثو كل أمة على ركبها للحساب.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ركزت على لجم الدهريين والملاحدة القائلين: «ما هي إلا حياتنا الدنيا نموت ونحيا وما يهلكنا إلا الدهر».</li>
                </ul>
            `,
            "46": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الأحقاف</strong> هي خاتمة سور الحواميم، وتحدثت عن مساكن قوم عاد (الأحقاف)، وعن إسلام وإيمان <strong>نفر من الجن</strong> بالقرآن.</li>
                    <li><i class="fa-solid fa-check-circle"></i> أوصت بالوالدين إحساناً، وحثت على الصبر والتشبه بـ «أولي العزم من الرسل».</li>
                </ul>
            `,
            "47": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>محمد</strong> (وتسمى سورة القتال) تتميز بذكر اسم النبي ﷺ وتوضح أحكام الجهاد والأسرى.</li>
                    <li><i class="fa-solid fa-check-circle"></i> حذرت من حبوط الأعمال وضلال السعي، ووعدت بـ <strong>أنهار الجنة</strong> الأربعة (ماء، لبن، خمر، وعسل مصفى).</li>
                </ul>
            `,
            "48": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الفتح</strong> نزلت في الطريق عند القفول من صلح الحديبية، وقال عنها النبي ﷺ: «لقد أنزلت علي الليلة سورة لهي أحب إلي مما طلعت عليه الشمس».</li>
                    <li><i class="fa-solid fa-check-circle"></i> بشرت بـ <strong>الفتح المبين</strong> والمغفرة، وتضمنت ذكر الرضوان عن بايعوا تحت الشجرة.</li>
                </ul>
            `,
            "49": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الحجرات</strong> هي سورة الأخلاق والآداب الإسلامية الرفيعة وبناء المجتمع الفاضل.</li>
                    <li><i class="fa-solid fa-check-circle"></i> حرمت السخرية، الغيبة، التجسس، والتنابز بالألقاب، ورسخت مقياس التفاضل: <strong>«إن أكرمكم عند الله أتقاكم»</strong>.</li>
                </ul>
            `,
            "50": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>ق</strong> كان النبي ﷺ يقرأ بها كثيراً في خطبة يوم الجمعة وعيد الأضحى والفجر لما فيها من التذكير بالمبدأ والمعاد.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ركزت على عظمة المراقبة الإلهية: «ما يلفظ من قول إلا لديه رقيب عتيد»، وسكرات الموت بالحق.</li>
                </ul>
            `,
            "51": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الذاريات</strong> قررت الغاية الأساسية والأولى من خلق الإنس والجن: <strong>«وما خلقت الجن والإنس إلا ليعبدون»</strong>.</li>
                    <li><i class="fa-solid fa-check-circle"></i> بينت صفات المتقين وجزائهم، وذكرت بشارة الملائكة لإبراهيم وإهلاك قوم لوط وثمود وعاد.</li>
                </ul>
            `,
            "52": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الطور</strong> سمعها جبير بن مطعم قبل أن يسلم والنبي يقرأ بها في المغرب فقال: «كاد قلبي أن يطير».</li>
                    <li><i class="fa-solid fa-check-circle"></i> دحضت شبهات الكفار بأسئلة عقلية صارمة: «أم خُلقوا من غير شيء أم هم الخالقون».</li>
                </ul>
            `,
            "53": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>النجم</strong> هي أول سورة أعلن النبي ﷺ قراءتها في الحرم وسجد في آخرها المسلمون والمشركون هيبةً لها.</li>
                    <li><i class="fa-solid fa-check-circle"></i> وثقت رحلة المعراج والوصول إلى <strong>سدرة المنتهى</strong> ورؤية جبريل على صورته الملائكية الحقيقية.</li>
                </ul>
            `,
            "54": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>القمر</strong> افتتحت بمعجزة حسية باهرة هزت قريشاً وهي <strong>انشقاق القمر</strong>.</li>
                    <li><i class="fa-solid fa-check-circle"></i> تميزت بتكرار آية تيسير فهم الذكر: «ولقد يسرنا القرآن للذكر فهل من مدكر» أربع مرات.</li>
                </ul>
            `,
            "55": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الرحمن</strong> تسمى <strong>عروس القرآن</strong>، وافتتحت باسم الله "الرحمن" وتعداد آلائه الإعجازية.</li>
                    <li><i class="fa-solid fa-check-circle"></i> تميزت بالترجيع الإيقاعي المتكرر 31 مرة للآية الحازمة: «فبأي آلاء ربكما تكذبان».</li>
                </ul>
            `,
            "56": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الواقعة</strong> ورد في الأثر أنها مانعة من الفاقة (الفقر) لمن قرأها كل ليلة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ذكرت أهوال القيامة وتقسيم الناس إلى ثلاثة أصناف (أصحاب الميمنة، المشأمة، والسابقون).</li>
                </ul>
            `,
            "57": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الحديد</strong> هي رأس سور "المسبحات" (التي تبدأ بـ سبح أو يسبح)، وتناولت حقيقة الإيمان والإنفاق.</li>
                    <li><i class="fa-solid fa-check-circle"></i> بينت التوازن والمنفعة في خلق الحديد: «وأنزلنا الحديد فيه بأس شديد ومنافع للناس».</li>
                </ul>
            `,
            "58": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>المجادلة</strong> افتتحت بنصرة الله لامرأة تشتكي زوجها (خولة بنت ثعلبة): «قد سمع الله قول التي تجادلك في زوجها».</li>
                    <li><i class="fa-solid fa-check-circle"></i> تميزت بخاصية فريدة: <strong>ورد لفظ الجلالة (الله) في كل آية من آياتها</strong> دون استثناء.</li>
                </ul>
            `,
            "59": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> أواخر سورة <strong>الحشر</strong> اشتملت على أسماء الله الحسنى وصفاته العُلا.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ورد في فضل الآيات الثلاث الأخيرة منها استغفار سبعين ألف ملك لمن قرأها صباحاً أو مساءً.</li>
                </ul>
            `,
            "60": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الممتحنة</strong> نظمت العلاقات والروابط الخارجية للدولة الإسلامية على أساس الولاء والبراء لا القرابة المادية.</li>
                    <li><i class="fa-solid fa-check-circle"></i> سميت بذلك لأن الله أمر باختبار وامتحان النساء المهاجرات للتأكد من صدق إيمانهن.</li>
                </ul>
            `,
            "61": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الصف</strong> حثت على وحدة الصف الإسلامي والجهاد الجماعي: «إن الله يحب الذين يقاتلون في سبيله صفاً كأنهم بنيان مرصوص».</li>
                    <li><i class="fa-solid fa-check-circle"></i> تضمنت البشارة الصريحة من عيسى عليه السلام بالنبي أحمد (محمد) ﷺ.</li>
                </ul>
            `,
            "62": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> كان النبي صلى الله عليه وسلم يقرأ سورة <strong>الجمعة</strong> في صلاة الجمعة والمغرب ليلة الجمعة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> تذكر بوجوب السعي إلى الصلاة وترك البيع والتجارة عند النداء.</li>
                </ul>
            `,
            "63": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>المنافقون</strong> كشفت أساليب النفاق الطاعنة في جسد الأمة وحيل زعيمهم عبد الله بن أبي بن سلول.</li>
                    <li><i class="fa-solid fa-check-circle"></i> وضعت القاعدة التحذيرية: «إن المنافقين لكاذبون»، وحذرت المؤمنين من إلهاء الأموال والأولاد عن ذكر الله.</li>
                </ul>
            `,
            "64": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>التغابن</strong> سميت بهذا الاسم لأنها بينت الخسارة والغبن الحقيقي الذي يقع على الكافرين يوم القيامة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> نبهت إلى أن من الأزواج والأولاد عدواً للمؤمنين فاحذروهم واعفوا واصفحوا.</li>
                </ul>
            `,
            "65": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الطلاق</strong> تسمى أيضاً "سورة النساء الصغرى"، وفصلت أحكام الطلاق، العدة، والنفقة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ضمت آيات الفرج والرزق الشهيرة للقلوب الواجلة: <strong>«ومن يتق الله يجعل له مخرجاً * ويرزقه من حيث لا يحتسب»</strong>.</li>
                </ul>
            `,
            "66": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>التحريم</strong> عاتبت النبي ﷺ في تحريمه ما أحل الله له إرضاءً لبعض أزواجه، ووضعت دستور البيوت الطاهرة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> ضربت مثلاً سيئاً بامرأتي نوح ولوط، ومثلاً صالحاً ملهماً بامرأة فرعون (آسية) ومريم ابنة عمران.</li>
                </ul>
            `,
            "67": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الملك</strong> هي <strong>المانعة من عذاب القبر</strong>.</li>
                    <li><i class="fa-solid fa-check-circle"></i> هي سورة <strong>تبارك</strong>، تشفع لصاحبها حتى يُغفر له (30 آية حمت قارئها).</li>
                </ul>
            `,
            "68": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>القلم</strong> (نون) افتتحت بالقسم بأداة الكتابة للدلالة على شرف العلم، وزكّت أخلاق النبي زكاة مطلقة: «وإنك لعلى خلق عظيم».</li>
                    <li><i class="fa-solid fa-check-circle"></i> عرضت قصة "أصحاب الجنة" (البستان) كعبرة لمن يمنع حق الفقراء والمساكين.</li>
                </ul>
            `,
            "69": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الحاقة</strong> أظهرت جلال وعظمة القيامة، وفصلت عاقبة هلاك ثمود وعاد وفرعون بالصاعقة والطاغية.</li>
                    <li><i class="fa-solid fa-check-circle"></i> صورت فرحة الفائز بكتابه بيمينه: «هاؤم اقرؤوا كتابيه»، وحسرة الخاسر بشماله.</li>
                </ul>
            `,
            "70": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>المعارج</strong> سميت بذلك لبيان عروج الملائكة إلى الله في يوم كان مقداره خمسين ألف سنة، وتأمر بالصبر الجميل.</li>
                    <li><i class="fa-solid fa-check-circle"></i> وصفت طبيعة النفس الإنسانية غير المهذبة بالإيمان (هلوعاً، جزوعاً، ومنوعاً) واستثنت المصلين.</li>
                </ul>
            `,
            "71": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>نوح</strong> عرضت نموذجاً مخلصاً وصابراً للدعوة إلى الله على مدار 950 سنة بكافة الأساليب (ليلاً ونهاراً، سراً وجهاراً).</li>
                    <li><i class="fa-solid fa-check-circle"></i> بينت ثمرة <strong>الاستغفار</strong> الدنيوية المباشرة: «يرسل السماء عليكم مدراراً * ويمددكم بأموال وبنين...».</li>
                </ul>
            `,
            "72": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الجن</strong> كشفت بدقة غيبية عن عالم الجن عند استماعهم للقرآن وتأثرهم البالغ به وإعلانهم التوحيد.</li>
                    <li><i class="fa-solid fa-check-circle"></i> أكدت على حماية الوحي بالرصد والشهب، وأن المساجد لله فلا يدعى مع الله أحداً.</li>
                </ul>
            `,
            "73": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>المزمل</strong> نزل صدرها بأمر النبي ﷺ بـ <strong>قيام الليل</strong> وترتيل القرآن ترتيلاً لإعداد النفس للقول الثقيل.</li>
                    <li><i class="fa-solid fa-check-circle"></i> خفف الله في آخرها عن الأمة بمراعاة المرضى والمسافرين والمجاهدين.</li>
                </ul>
            `,
            "74": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>المدثر</strong> هي أول سورة أمرت النبي ﷺ بالدعوة والجهر بالرسالة والإنذار: «يا أيها المدثر * قم فأنذر».</li>
                    <li><i class="fa-solid fa-check-circle"></i> تضمنت إشارات لطهارة الثياب واجتناب الرجز، ووصف سقر وخزنتها التسعة عشر.</li>
                </ul>
            `,
            "75": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>القيامة</strong> أقسم الله فيها بيوم القيامة وبالنفس اللوامة، وذكرت عجز الإنسان عن الهرب: «يقول الإنسان يومئذ أين المفر».</li>
                    <li><i class="fa-solid fa-check-circle"></i> تضمنت نهي الله لنبيّه عن تحريك لسانه بالعجل عند نزول الوحي متكفلاً بحفظه وبيانه: «إن علينا جمعه وقرآنه».</li>
                </ul>
            `,
            "76": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الإنسان</strong> (هل أتى) كان النبي يداوم على قراءتها في الركعة الثانية من صلاة فجر يوم الجمعة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> وصفت نعيم أهل الجنة من لباس حرير، شراب زنجبيل وكافور، وملك كبير بالتفصيل تشجيعاً للمؤمنين.</li>
                </ul>
            `,
            "77": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>المرسلات</strong> هي آخر سورة نزلت بمكة قبل الهجرة، وتسمى سورة "التهديد والوعيد" للمكذبين.</li>
                    <li><i class="fa-solid fa-check-circle"></i> تكررت فيها عشر مرات آية الزجر العظيمة: «ويل يومئذ للمكذبين».</li>
                </ul>
            `,
            "78": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>النبأ</strong> (عمّ) تساءل فيها كفار مكة عن النبأ العظيم وهو البعث والنشور، وفيها تذكرة بليغة بالقيامة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> عرضت الآيات الكونية الباهرة المثبتة للقدرة الربانية كالمهاد والأوتاد والسبع الشداد.</li>
                </ul>
            `,
            "79": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>النازعات</strong> افتتحت بالقسم بالملائكة الموكلة بقبض الأرواح بشدة (النازعات غرقاً) وبلطف (الناشطات نشطاً).</li>
                    <li><i class="fa-solid fa-check-circle"></i> قارنت بين عاقبة الطاغي المستكبر ومآل الخائف من مقام ربه الناهي للنفس عن الهوى.</li>
                </ul>
            `,
            "80": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>عبس</strong> عاتبت النبي ﷺ بأسلوب راقٍ لانشغاله بصناديد قريش عن ابن أم مكتوم الأعمى الذي جاء يستفتيه.</li>
                    <li><i class="fa-solid fa-check-circle"></i> بينت شرف ومكانة الصحف القرآنية بأيدي سفرة كرام بررة، وصورت مشهد فرار المرء من أخيه وأمه وأبيه.</li>
                </ul>
            `,
            "81": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>التكوير</strong> قال عنها النبي ﷺ: «من سره أن ينظر إلى يوم القيامة كأنه رأي عين فليقرأ إذا الشمس كورت...».</li>
                    <li><i class="fa-solid fa-check-circle"></i> رسمت مشهداً انقلابياً كلياً للكون باحتراق البحار، وتسيير الجبال، وسؤال الموؤودة بأي ذنب قتلت.</li>
                </ul>
            `,
            "82": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الانفطار</strong> تابعة لحديث «من سره أن ينظر إلى يوم القيامة كأنه رأي عين»، وتبرز انشقاق السماء وانتثار الكواكب.</li>
                    <li><i class="fa-solid fa-check-circle"></i> عاتبت الإنسان المقصر: «يا أيها الإنسان ما غرك بربك الكريم»، وثبّتت وجود الحفظة الكرام الكاتبين.</li>
                </ul>
            `,
            "83": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>المطففين</strong> توعدت بحزم المتلاعبين بالأوزان والمقاييس الدنيوية في المعاملات المالية.</li>
                    <li><i class="fa-solid fa-check-circle"></i> بينت مستودع كتاب الفجار (سجين) وكتاب الأبرار (عليون)، واختتمت بنصرة المؤمنين وضلال سخافة الكفار منهم.</li>
                </ul>
            `,
            "84": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الانشقاق</strong> السورة الثالثة المعنية بـ "رأي العين" لأهوال القيامة وانقياد السماء والأرض لأمر ربهما وحُقّ لهما.</li>
                    <li><i class="fa-solid fa-check-circle"></i> وضحت كدح الإنسان المستمر في الحياة حتى لقاء ربه ليحاسب حساباً يسيراً أو ينقلب إلى أهله مسروراً.</li>
                </ul>
            `,
            "85": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>البروج</strong> واسى الله فيها المؤمنين بقصة <strong>أصحاب الأخدود</strong> وثباتهم الأسطوري على التوحيد في وجه النار.</li>
                    <li><i class="fa-solid fa-check-circle"></i> أكدت شرف وحفظ القرآن في لوح محفوظ، وتوعدت الجبابرة مستحضرةً هلاك جنود فرعون وثمود.</li>
                </ul>
            `,
            "86": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الطارق</strong> أقسمت بالطارق (النجم الثاقب) على أن كل نفس عليها حافظ من الله، وذكرت أصل خلق الإنسان من ماء دافق.</li>
                    <li><i class="fa-solid fa-check-circle"></i> وصفت القرآن بأنه: «قول فصل وما هو بالهزل»، وهددت الكافرين بإمهالهم رويداً.</li>
                </ul>
            `,
            "87": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الأعلى</strong> كان النبي صلى الله عليه وسلم يحبها ويقرأ بها في صلاة العيدين والجمعة والوتر.</li>
                    <li><i class="fa-solid fa-check-circle"></i> قررت نجاة وفلاح من تزكى وذكر اسم ربه فصلى، وأكدت توافق دعوتها مع صحف إبراهيم وموسى.</li>
                </ul>
            `,
            "88": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الغاشية</strong> كان يقرأ بها النبي صلى الله عليه وسلم في صلاة العيدين والجمعة مع سورة الأعلى.</li>
                    <li><i class="fa-solid fa-check-circle"></i> قسمت الناس إلى وجوه خاشعة عاملة ناصبة في النار، ووجوه ناعمة راضية في جنة عالية، وحددت مهمة الرسول: «إنما أنت مذكر».</li>
                </ul>
            `,
            "89": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الفجر</strong> أقسمت بالليالي العشر الفاضلة (عشر ذي الحجة)، وعرضت بطش الله بعاد إرم وثمود وفرعون ذي الأوتاد.</li>
                    <li><i class="fa-solid fa-check-circle"></i> اختتمت بأحنّ نداء رباني يبشر المؤمن عند الموت: <strong>«يا أيتها النفس المطمئنة ارجعي إلى ربك راضية مرضية»</strong>.</li>
                </ul>
            `,
            "90": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>البلد</strong> قررت طبيعة الحياة البشرية القائمة على التعب والمشقة: «لقد خلقنا الإنسان في كبد».</li>
                    <li><i class="fa-solid fa-check-circle"></i> حثت على اقتحام العقبة الأخلاقية بإطعام الجوعى وفك الرقاب والتواصي بالصبر والمرحمة.</li>
                </ul>
            `,
            "91": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الشمس</strong> تضمنت أطول قسم متتابع في القرآن (11 قَسماً) لبيان قضية خطيرة وهي تزكية النفس.</li>
                    <li><i class="fa-solid fa-check-circle"></i> حسمت معادلة النجاة: <strong>«قد أفلح من زكاها * وقد خاب من دساها»</strong>، وسردت عاقبة عقر ناقة الله وثمود.</li>
                </ul>
            `,
            "92": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الليل</strong> وازنت بين مسارين: من أعطى واتقى وصدق بالحسنى (فيسر لليسرى)، ومن بخل واستغنى وكذب بالحسنى (فيسر للعسرى).</li>
                    <li><i class="fa-solid fa-check-circle"></i> نزلت في فضل بذل وإنفاق أبي بكر الصديق رضي الله عنه: «وسيجنبها الأتقى * الذي يؤتي ماله يتزكى».</li>
                </ul>
            `,
            "93": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الضحى</strong> نزلت لتسلية قلب النبي ﷺ وتبشيره بعد فتور وتأخر الوحي عنه وادعاء المشركين قِلاه.</li>
                    <li><i class="fa-solid fa-check-circle"></i> حملت الوعد العظيم: «ولسوف يعطيك ربك فترضى»، وأمرت برعاية اليتيم وإرشاد السائل والتحدث بنعمة الله.</li>
                </ul>
            `,
            "94": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الشرح</strong> (الانشراح) سورة الامتنان بتهيئة باطن النبي ورسخت ثنائية العسر والفرج: <strong>«فإن مع العسر يسراً * إن مع العسر يسراً»</strong>.</li>
                    <li><i class="fa-solid fa-check-circle"></i> وجهت العبد عند الفراغ من شؤون الدنيا إلى النصب والاجتهاد في العبادة والرغبة إلى الله وحده.</li>
                </ul>
            `,
            "95": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>التين</strong> أقسمت بالبقاع المقدسة المنبتة للرسالات لتؤكد تكريم خلق الإنسان: «لقد خلقنا الإنسان في أحسن تقويم».</li>
                    <li><i class="fa-solid fa-check-circle"></i> حذرت من الرد إلى أسفل سافلين إلا أهل الإيمان والعمل الصالح، واختتمت بـ «أليس الله بأحكم الحاكمين».</li>
                </ul>
            `,
            "96": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>العلق</strong> (اقرأ) هي <strong>أول ما نزل من القرآن الكريم</strong> في غار حراء، مدشنةً عصر العلم والقراءة.</li>
                    <li><i class="fa-solid fa-check-circle"></i> تضمنت الزجر لأبي جهل، واختتمت بأمر السجود والاقتراب من الله: «كلا لا تطعه واسجد واقترب».</li>
                </ul>
            `,
            "97": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>القدر</strong> تتحدث عن ليلة القدر العظيمة التي هي خير من ألف شهر ونزول القرآن الكريم فيها جملة واحدة للسموات الدنيا.</li>
                </ul>
            `,
            "98": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>البينة</strong> (لم يكن) تسمى سورة أهل الكتاب، ووضعت فيصل التمايز بين "شر البرية" من كفر و "خير البرية" من آمن وعمل الصالحات.</li>
                </ul>
            `,
            "99": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الزلزلة</strong> ورد في السنن أنها تعدل <strong>نصف القرآن</strong> لما تحويه من خلاصة البعث والجزاء الدقيق: <strong>«فمن يعمل مثقال ذرة خيراً يره»</strong>.</li>
                </ul>
            `,
            "100": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>العاديات</strong> أقسمت بخيل الجهاد وصوت أنفاسها وجريها، لتلفت إلى جحود النفس الإنسانية وشحّها: «إن الإنسان لربه لكنود».</li>
                </ul>
            `,
            "101": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>القارعة</strong> سورة قصيرة ومرعبة تقرع القلوب بأهوال القيامة كفراش مبثوث وعن ذهن الجبال المنسوفة كعهن منفوش، وموازين ثقيلة وخفيفة تؤول لهاوية.</li>
                </ul>
            `,
            "102": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>التكاثر</strong> قال عنها النبي صلى الله عليه وسلم زاجراً: «أما يستطيع أحدكم أن يقرأ ألف آية في كل ليلة؟... أما يستطيع أحدكم أن يقرأ ألهاكم التكاثر».</li>
                </ul>
            `,
            "103": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>العصر</strong> قال عنها الإمام الشافعي: «لو ما أنزل الله حجة على خلقه إلا هذه السورة لكفتهم» لأنها جمعت شروط النجاة الأربعة.</li>
                </ul>
            `,
            "104": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الهمزة</strong> توعدت بعذاب الحطمة لكل من يغتاب الناس ويعيبهم بلسانه وإشاراته (الهمز واللمز) ويظن أن ماله يخلده.</li>
                </ul>
            `,
            "105": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الفيل</strong> تذكرة بمعجزة حماية الكعبة من طغيان أبرهة الأشرم وجيشه بإرسال الطير الأبابيل، وهي دليل على حفظ بيته.</li>
                </ul>
            `,
            "106": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>قريش</strong> تذكر قريشاً بنعمة الأمن والرزق وتيسير رحلتي الشتاء والصيف، وتأمرهم بإخلاص العبادة لرب هذا البيت.</li>
                </ul>
            `,
            "107": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الماعون</strong> فضحت صفات مكذبي الدين كدفع اليتيم، ومنع الماعون، والسهو عن الصلاة رياءً.</li>
                </ul>
            `,
            "108": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الكوثر</strong> هي <strong>أقصر سورة في القرآن الكريم</strong>، ونزلت تطييباً لقلب النبي ﷺ وبشارة له بنهر الكوثر وبتر شانئه (مبغضه).</li>
                </ul>
            `,
            "109": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الكافرون</strong> تعدل <strong>ربع القرآن</strong>.</li>
                    <li><i class="fa-solid fa-check-circle"></i> فيها براءة قطعية من الشرك، وهي سورة <strong>الإخلاص</strong> في النفي والعبادة.</li>
                </ul>
            `,
            "110": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>النصر</strong> (التوديع) تعدل <strong>ربع القرآن</strong> في بعض الروايات، وهي السورة التي نعت إلى النبي ﷺ قرب أجله ودخل الناس بعدها في الدين أفواجاً.</li>
                </ul>
            `,
            "111": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>المسد</strong> معجزة غيبية تضمنت حكماً بهلاك أبي لهب وزوجته ودخولهما النار، وماتا على الكفر بعد نزولها بسنوات ولم يسلما رياءً.</li>
                </ul>
            `,
            "112": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الإخلاص</strong> تعدل <strong>ثلث القرآن</strong> (رواه البخاري ومسلم).</li>
                    <li><i class="fa-solid fa-check-circle"></i> هي سورة <strong>التوحيد خالصاً</strong>، ونفي الصاحبة والولد والند، ومن أحبها أحبه الله.</li>
                </ul>
            `,
            "113": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الفلق</strong> من <strong>المعوذتين</strong>، وهي من أعظم ما يستعاذ به من شرور المخلوقات، الغاسق، النفاثات، والحاسد.</li>
                    <li><i class="fa-solid fa-check-circle"></i> كانت من أهم <strong>رقية</strong> تحصين للنبي ﷺ وأهل بيته.</li>
                </ul>
            `,
            "114": `
                <ul>
                    <li><i class="fa-solid fa-check-circle"></i> سورة <strong>الناس</strong> من <strong>المعوذتين</strong>، وخاتمة كتاب الله الشريفة للاستعاذة من الوسواس الخناس من الجنة والناس.</li>
                    <li><i class="fa-solid fa-check-circle"></i> قال رسول الله صلى الله عليه وسلم عنها وعن الفلق: «لم يتعوذ بمثلهما قط».</li>
                </ul>
            `

        // ================================================================

        let surahList = [];
