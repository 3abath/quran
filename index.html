<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المصحف الشريف – تلاوة وفضائل السور</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* All styles remain unchanged from the previous working version */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg: #f8f5f0;
            --surface: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --primary: #0f766e;
            --primary-light: #ccf2ef;
            --gold: #b8860b;
            --border: #e2e8f0;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            --radius: 20px;
            --font-ui: 'Cairo', sans-serif;
            --font-quran: 'Amiri Quran', serif;
            --player-height: 80px;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-ui);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        button, input {
            font-family: inherit;
            background: none;
            border: none;
            color: inherit;
        }
        input:focus {
            outline: none;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 2rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            height: 68px;
            flex-shrink: 0;
            gap: 0.75rem;
            z-index: 10;
            flex-wrap: wrap;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .logo i { font-size: 1.4rem; }
        .search-bar {
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 0.35rem 1.2rem;
            flex: 1 1 320px;
            max-width: 480px;
        }
        .search-bar i { color: var(--text-muted); font-size: 0.95rem; }
        .search-bar input {
            width: 100%;
            padding: 0.45rem 0.7rem;
            font-size: 0.95rem;
            background: transparent;
        }
        .header-actions {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }
        .header-actions i {
            font-size: 1.2rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.3rem;
            border-radius: 50%;
            transition: 0.15s;
        }
        .header-actions i:hover {
            background: var(--primary-light);
            color: var(--primary);
        }
        main {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .view {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            display: none;
            padding: 1.5rem 2rem;
            padding-bottom: calc(var(--player-height) + 20px);
        }
        .view.active { display: block; }
        .accueil-wrap { max-width: 1100px; margin: 0 auto; }
        .hero {
            text-align: center;
            padding: 2rem 0 2.5rem;
        }
        .hero h1 {
            font-size: 2.2rem;
            color: var(--primary);
        }
        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 0.3rem;
        }
        .search-center {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 0.6rem 1.8rem;
            display: flex;
            align-items: center;
            max-width: 640px;
            margin: 0 auto 2.5rem;
        }
        .search-center i { color: var(--text-muted); }
        .search-center input {
            width: 100%;
            font-size: 1.05rem;
            padding: 0.5rem 1rem;
            background: transparent;
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            border-bottom: 3px solid var(--primary);
            display: inline-block;
            padding-bottom: 0.3rem;
            margin-bottom: 1.5rem;
        }
        .surah-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 0.8rem;
        }
        .surah-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.6rem 0.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.15s;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .surah-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }
        .surah-info {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            flex: 1;
            min-width: 140px;
        }
        .surah-info .num {
            background: var(--bg);
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .surah-info .name {
            font-family: var(--font-quran);
            font-size: 1.15rem;
            font-weight: 600;
        }
        .surah-info .meta {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-right: auto;
        }
        .btn-group {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .btn-sm {
            padding: 0.3rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .btn-benefits {
            background: var(--primary-light);
            color: var(--primary);
        }
        .btn-benefits:hover {
            background: var(--primary);
            color: #fff;
        }
        .btn-play {
            background: #1a1a2e;
            color: #fff;
        }
        .btn-play:hover {
            background: #0f766e;
            transform: scale(1.05);
        }
        .btn-play.playing {
            background: #b91c1c;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .lecture-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100%;
            gap: 0;
        }
        .sidebar {
            background: var(--surface);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            padding: 0.8rem 0.5rem;
            height: 100%;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
        .surah-nav-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0.9rem;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.12s;
            font-size: 0.95rem;
            align-items: center;
        }
        .surah-nav-item:hover {
            background: var(--primary-light);
            color: var(--primary);
        }
        .surah-nav-item.active {
            background: var(--primary);
            color: #fff;
            font-weight: 600;
        }
        .surah-nav-item .nav-play {
            font-size: 0.8rem;
            cursor: pointer;
            padding: 0 0.3rem;
            opacity: 0.7;
        }
        .surah-nav-item .nav-play:hover {
            opacity: 1;
            color: var(--gold);
        }

        .quran-area {
            overflow-y: auto;
            padding: 2rem 2.8rem;
            height: 100%;
            direction: rtl;
            background: var(--bg);
            padding-bottom: calc(var(--player-height) + 20px);
        }
        .quran-area::-webkit-scrollbar { width: 6px; }
        .quran-area::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .surah-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .surah-header .left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .surah-header h2 {
            font-family: var(--font-quran);
            font-size: 2rem;
            color: var(--primary);
        }
        .surah-header .btn-group-lg {
            display: flex;
            gap: 0.6rem;
        }
        .btn-lg {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.95rem;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-lg.benefits {
            background: var(--primary-light);
            color: var(--primary);
        }
        .btn-lg.benefits:hover {
            background: var(--primary);
            color: #fff;
        }
        .btn-lg.play {
            background: #1a1a2e;
            color: #fff;
        }
        .btn-lg.play:hover {
            background: #0f766e;
        }
        .btn-lg.play.playing {
            background: #b91c1c;
            animation: pulse 1s infinite;
        }

        .bismillah {
            font-family: var(--font-quran);
            font-size: 2.6rem;
            text-align: center;
            color: var(--primary);
            margin-bottom: 2rem;
            opacity: 0.7;
        }
        .verse-text {
            font-family: var(--font-quran);
            font-size: 2.1rem;
            line-height: 3.2rem;
            padding: 0 3px;
            border-radius: 6px;
            display: inline;
        }
        .verse-number {
            font-family: var(--font-ui);
            font-size: 0.8rem;
            color: var(--gold);
            font-weight: 700;
            margin: 0 0.25rem;
            display: inline-block;
        }
        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .loading-spinner i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* Player Bar */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--player-height);
            background: #0f0f0f;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            border-top: 2px solid var(--primary);
            padding: 0 1rem;
        }
        .player-bar.active {
            display: flex;
        }
        .player-bar .player-wrapper {
            width: 100%;
            max-width: 800px;
            height: 100%;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: relative;
        }
        .player-bar .player-wrapper #playerContainer {
            width: 120px;
            height: 68px;
            flex-shrink: 0;
            border-radius: 6px;
            overflow: hidden;
            background: #000;
            border: 1px solid #333;
        }
        .player-bar .player-wrapper #playerContainer iframe {
            width: 100% !important;
            height: 100% !important;
        }
        .player-bar .player-close {
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0.5rem;
            flex-shrink: 0;
        }
        .player-bar .player-close:hover {
            color: #ef4444;
        }
        .player-bar .player-info {
            color: #fff;
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 80px;
            flex-shrink: 0;
        }

        .audio-controls {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex: 1;
            justify-content: center;
        }
        .audio-controls .ctrl-btn {
            color: #fff;
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.15s;
            opacity: 0.8;
        }
        .audio-controls .ctrl-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        .audio-controls .ctrl-btn.playing {
            color: #f59e0b;
            animation: pulse 1s infinite;
        }
        .audio-controls .ctrl-btn.big {
            font-size: 2.4rem;
        }
        .audio-controls .progress-wrap {
            flex: 1;
            min-width: 60px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .audio-controls .progress-wrap .time {
            color: #aaa;
            font-size: 0.7rem;
            font-weight: 300;
            min-width: 36px;
            text-align: center;
        }
        .audio-controls .progress-bar {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }
        .audio-controls .progress-bar .fill {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
            width: 0%;
            transition: width 0.1s;
        }
        .audio-controls .progress-bar .handle {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            left: 0%;
            display: none;
        }
        .audio-controls .progress-bar:hover .handle {
            display: block;
        }

        .search-results-wrap {
            max-width: 800px;
            margin: 0 auto;
        }
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.4rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: 0.15s;
        }
        .result-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }
        .result-card .head {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--primary);
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .result-card .head .result-actions {
            display: flex;
            gap: 0.5rem;
        }
        .result-card .head .result-actions button {
            background: var(--primary-light);
            color: var(--primary);
            padding: 0.1rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 600;
        }
        .result-card .head .result-actions button:hover {
            background: var(--primary);
            color: #fff;
        }
        .result-card .text {
            font-family: var(--font-quran);
            font-size: 1.6rem;
            line-height: 2.4rem;
        }
        .highlight {
            background: #fef3c7;
            color: var(--primary);
            padding: 0 4px;
            border-radius: 4px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--surface);
            border-radius: 28px;
            max-width: 660px;
            width: 100%;
            max-height: 88vh;
            overflow-y: auto;
            padding: 2rem 2.2rem;
            position: relative;
            animation: fadeUp 0.25s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-close {
            position: absolute;
            top: 1.2rem;
            left: 1.5rem;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.15s;
        }
        .modal-close:hover {
            color: var(--text);
            transform: rotate(90deg);
        }
        .modal-title {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.3rem;
            border-right: 4px solid var(--gold);
            padding-right: 1rem;
            margin-bottom: 1.2rem;
        }
        .modal-body {
            font-size: 1.05rem;
            line-height: 2;
            text-align: justify;
            color: #1e293b;
            padding: 0.5rem 0;
        }
        .modal-body .error-text {
            text-align: center;
            padding: 1.5rem;
            color: #b91c1c;
            background: #fee2e2;
            border-radius: 12px;
        }
        .modal-body ul {
            list-style: none;
            padding: 0;
        }
        .modal-body li {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 0.8rem;
            align-items: baseline;
        }
        .modal-body li i {
            color: var(--gold);
            font-size: 1rem;
            width: 1.5rem;
            text-align: center;
        }

        body.mode-concentration .sidebar,
        body.mode-concentration header {
            display: none !important;
        }
        body.mode-concentration .lecture-layout {
            grid-template-columns: 1fr;
        }
        body.mode-concentration .quran-area {
            padding: 3rem 3.5rem;
            max-width: 860px;
            margin: 0 auto;
        }
        .focus-btn {
            position: fixed;
            bottom: calc(var(--player-height) + 20px);
            left: 2rem;
            background: var(--primary);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 6px 20px rgba(15,118,118,0.3);
            cursor: pointer;
            z-index: 50;
            transition: 0.2s;
            border: none;
        }
        .focus-btn:hover { transform: scale(1.06); }

        @media (max-width: 820px) {
            .lecture-layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .quran-area { padding: 1.2rem; }
            .verse-text { font-size: 1.6rem; line-height: 2.8rem; }
            .hero h1 { font-size: 1.6rem; }
            header { padding: 0.4rem 1rem; height: auto; gap: 0.4rem; }
            .search-bar { flex: 1 1 200px; min-width: 140px; }
            .modal-box { padding: 1.5rem; margin: 0.5rem; }
            .surah-grid { grid-template-columns: 1fr; }
            .surah-card { flex-wrap: wrap; }
            .btn-group { width: 100%; justify-content: flex-start; }
            .surah-header .left { width: 100%; justify-content: space-between; }
            .surah-header .btn-group-lg { width: 100%; justify-content: flex-start; }
            .player-bar .player-wrapper { flex-wrap: wrap; gap: 0.3rem; }
            .player-bar .player-info { font-size: 0.6rem; min-width: 50px; }
            .player-bar { height: 70px; }
            :root { --player-height: 70px; }
            .focus-btn { bottom: calc(var(--player-height) + 15px); }
            .audio-controls .ctrl-btn { font-size: 1.2rem; }
            .audio-controls .ctrl-btn.big { font-size: 1.8rem; }
            .player-bar .player-wrapper #playerContainer {
                width: 80px;
                height: 50px;
            }
        }
        @media (max-width: 480px) {
            .verse-text { font-size: 1.3rem; line-height: 2.4rem; }
            .quran-area { padding: 0.8rem; }
            .bismillah { font-size: 1.8rem; }
            .surah-header h2 { font-size: 1.5rem; }
            .btn-lg { font-size: 0.75rem; padding: 0.3rem 0.8rem; }
            .surah-card .btn-sm { font-size: 0.6rem; padding: 0.2rem 0.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="goHome()">
            <i class="fa-solid fa-book-quran"></i>
            <span>المصحف الشريف</span>
        </div>
        <div class="search-bar">
            <i class="fa-solid fa-search"></i>
            <input type="text" id="headerSearchInput" placeholder="سورة، 2:255، أو كلمة..." onkeydown="if(event.key==='Enter') doSearch(this.value)" />
        </div>
        <div class="header-actions">
            <i class="fa-solid fa-adjust" onclick="toggleFocus()" title="وضع التركيز"></i>
            <i class="fa-regular fa-clock" onclick="goHome()" title="الرئيسية"></i>
        </div>
    </header>

    <main>
        <div id="view-home" class="view active">
            <div class="accueil-wrap">
                <div class="hero">
                    <h1>🕋 المصحف الشريف</h1>
                    <p>اقرأ القرآن الكريم، واستمع للتلاوة، وتعرف على فضائل كل سورة</p>
                </div>
                <div class="search-center">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="homeSearchInput" placeholder="ابحث عن سورة، آية، أو كلمة..." onkeydown="if(event.key==='Enter') doSearch(this.value)" />
                </div>
                <div class="section-title">فهرس السور</div>
                <div id="homeLoading" class="loading-spinner"><i class="fa-solid fa-spinner fa-pulse"></i> جاري تحميل الفهرس...</div>
                <div class="surah-grid" id="surahGrid"></div>
            </div>
        </div>

        <div id="view-reading" class="view">
            <div class="lecture-layout">
                <aside class="sidebar" id="sidebarNav"></aside>
                <section class="quran-area" id="quranArea">
                    <div id="quranLoading" class="loading-spinner"><i class="fa-solid fa-spinner fa-pulse"></i> جاري تحميل السورة...</div>
                    <div id="surahHeader" class="surah-header" style="display:none;">
                        <div class="left">
                            <h2 id="surahNameDisplay"></h2>
                            <span id="surahMetaDisplay" style="font-size:0.8rem;color:var(--text-muted);"></span>
                        </div>
                        <div class="btn-group-lg">
                            <button class="btn-lg play" onclick="togglePlay(currentSurah)">
                                <i class="fa-solid fa-play"></i> <span id="playLabel">استماع</span>
                            </button>
                            <button class="btn-lg benefits" onclick="openBenefits(currentSurah)">
                                <i class="fa-solid fa-star"></i> فضائل
                            </button>
                        </div>
                    </div>

        // ================================================================
        //  STATE
        // ================================================================
        let surahList = [];
        let currentSurah = 1;
        let player = null;
        let isPlaying = false;
        let playerReady = false;
        let currentVideoId = null;
        let progressInterval = null;
        let playerInitializing = false;

        // ================================================================
        //  YOUTUBE IFrame API
        // ================================================================
        function loadYouTubeAPI() {
            if (document.getElementById('youtube-api-script')) return;
            const tag = document.createElement('script');
            tag.id = 'youtube-api-script';
            tag.src = 'https://www.youtube.com/iframe_api';
            document.head.appendChild(tag);
        }

        let onPlayerReadyCallback = null;

        function onYouTubeIframeAPIReady() {
            playerReady = true;
            if (onPlayerReadyCallback) {
                onPlayerReadyCallback();
                onPlayerReadyCallback = null;
            }
        }

        function initPlayer(surahNum) {
            return new Promise((resolve) => {
                if (playerInitializing) {
                    setTimeout(() => initPlayer(surahNum).then(resolve), 300);
                    return;
                }
                const container = document.getElementById('playerContainer');
                container.innerHTML = '';

                if (!playerReady) {
                    onPlayerReadyCallback = () => {
                        createPlayer(surahNum, resolve);
                    };
                    loadYouTubeAPI();
                    return;
                }
                createPlayer(surahNum, resolve);
            });
        }

        function createPlayer(surahNum, resolve) {
            const container = document.getElementById('playerContainer');
            const videoId = SURAH_VIDEO_IDS[surahNum];
            if (!videoId) {
                document.getElementById('playerInfo').textContent = '⚠️ لا يوجد فيديو لهذه السورة';
                resolve(false);
                return;
            }

            if (player && typeof player.destroy === 'function') {
                try { player.destroy(); } catch (e) {}
                player = null;
                currentVideoId = null;
            }

            currentVideoId = videoId;
            playerInitializing = true;

            player = new YT.Player(container, {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: {
                    autoplay: 1,
                    modestbranding: 1,
                    rel: 0,
                    showinfo: 0,
                    controls: 0,
                    origin: window.location.origin
                },
                events: {
                    onReady: (event) => {
                        playerInitializing = false;
                        const surahName = surahList.find(s => s.number === surahNum)?.name || `سورة ${surahNum}`;
                        document.getElementById('playerInfo').textContent = `▶️ ${surahName}`;
                        try {
                            event.target.playVideo();
                            isPlaying = true;
                            updatePlayState(surahNum);
                            updatePlayPauseIcon(true);
                            startProgressMonitoring();
                            document.getElementById('playerBar').classList.add('active');
                        } catch (e) {
                            updatePlayState(surahNum);
                            updatePlayPauseIcon(false);
                        }
                        resolve(true);
                    },
                    onStateChange: (event) => {
                        if (event.data === YT.PlayerState.PLAYING) {
                            document.getElementById('playerBar').classList.add('active');
                            isPlaying = true;
                            updatePlayState(currentSurah);
                            updatePlayPauseIcon(true);
                            startProgressMonitoring();
                            const surahName = surahList.find(s => s.number === currentSurah)?.name || 'سورة';
                            document.getElementById('playerInfo').textContent = `▶️ ${surahName}`;
                        } else if (event.data === YT.PlayerState.PAUSED) {
                            isPlaying = false;
                            updatePlayPauseIcon(false);
                            stopProgressMonitoring();
                            document.getElementById('playerInfo').textContent = `⏸️ متوقف`;
                        } else if (event.data === YT.PlayerState.ENDED) {
                            isPlaying = false;
                            updatePlayPauseIcon(false);
                            stopProgressMonitoring();
                            document.getElementById('playerInfo').textContent = '⏹️ انتهت التلاوة';
                            document.querySelectorAll('.btn-play, .btn-lg.play').forEach(el => {
                                el.classList.remove('playing');
                                const label = el.querySelector('span');
                                if (label) label.textContent = 'استماع';
                                const icon = el.querySelector('i');
                                if (icon) icon.className = 'fa-solid fa-play';
                            });
                            document.getElementById('progressFill').style.width = '0%';
                            document.getElementById('currentTimeDisplay').textContent = '0:00';
                        } else if (event.data === YT.PlayerState.UNSTARTED) {
                            updatePlayPauseIcon(false);
                        }
                    },
                    onError: (event) => {
                        console.warn('YouTube player error:', event.data);
                        playerInitializing = false;
                        document.getElementById('playerInfo').textContent = '⚠️ حدث خطأ في التشغيل';
                        resolve(false);
                    }
                }
            });
        }

        // ================================================================
        //  PROGRESS
        // ================================================================
        function startProgressMonitoring() {
            stopProgressMonitoring();
            progressInterval = setInterval(() => {
                if (player && player.getCurrentTime && player.getDuration) {
                    try {
                        const current = player.getCurrentTime();
                        const duration = player.getDuration();
                        if (duration > 0) {
                            const pct = (current / duration) * 100;
                            document.getElementById('progressFill').style.width = pct + '%';
                            document.getElementById('progressHandle').style.left = pct + '%';
                            document.getElementById('currentTimeDisplay').textContent = formatTime(current);
                            document.getElementById('durationDisplay').textContent = formatTime(duration);
                        }
                    } catch (e) { /* ignore */ }
                }
            }, 500);
        }

        function stopProgressMonitoring() {
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds) || seconds < 0) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function seekPlayer(e) {
            const bar = document.getElementById('progressBar');
            const rect = bar.getBoundingClientRect();
            const x = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
            if (player && player.getDuration) {
                const duration = player.getDuration();
                if (duration > 0) {
                    const seekTo = x * duration;
                    player.seekTo(seekTo, true);
                }
            }
        }

        function rewindPlayer() {
            if (player && player.getCurrentTime) {
                const t = player.getCurrentTime() - 10;
                player.seekTo(Math.max(0, t), true);
            }
        }

        function forwardPlayer() {
            if (player && player.getCurrentTime && player.getDuration) {
                const t = player.getCurrentTime() + 10;
                const dur = player.getDuration();
                player.seekTo(Math.min(dur, t), true);
            }
        }

        // ================================================================
        //  PLAY / PAUSE from bar
        // ================================================================
        function togglePlayFromBar() {
            if (!player) {
                togglePlay(currentSurah);
                return;
            }
            try {
                const state = player.getPlayerState();
                if (state === YT.PlayerState.PLAYING) {
                    player.pauseVideo();
                    isPlaying = false;
                    updatePlayPauseIcon(false);
                } else if (state === YT.PlayerState.PAUSED || state === YT.PlayerState.ENDED || state === YT.PlayerState.UNSTARTED) {
                    player.playVideo();
                    isPlaying = true;
                    updatePlayPauseIcon(true);
                    document.getElementById('playerBar').classList.add('active');
                } else {
                    player.playVideo();
                    isPlaying = true;
                    updatePlayPauseIcon(true);
                }
            } catch (e) {
                togglePlay(currentSurah);
            }
        }

        function updatePlayPauseIcon(playing) {
            const btn = document.getElementById('playPauseBtn');
            const icon = btn.querySelector('i');
            if (playing) {
                icon.className = 'fa-solid fa-pause';
                btn.classList.add('playing');
            } else {
                icon.className = 'fa-solid fa-play';
                btn.classList.remove('playing');
            }
        }

        // ================================================================
        //  PLAY / PAUSE from cards / header
        // ================================================================
        async function togglePlay(surahNum) {
            const bar = document.getElementById('playerBar');
            const info = document.getElementById('playerInfo');

            if (player && player.getPlayerState && currentVideoId === SURAH_VIDEO_IDS[surahNum]) {
                const state = player.getPlayerState();
                if (state === YT.PlayerState.PLAYING) {
                    player.pauseVideo();
                    isPlaying = false;
                    updatePlayPauseIcon(false);
                    document.querySelectorAll('.btn-play, .btn-lg.play').forEach(el => {
                        el.classList.remove('playing');
                        const label = el.querySelector('span');
                        if (label) label.textContent = 'استماع';
                        const icon = el.querySelector('i');
                        if (icon) icon.className = 'fa-solid fa-play';
                    });
                    return;
                } else if (state === YT.PlayerState.PAUSED || state === YT.PlayerState.ENDED) {
                    player.playVideo();
                    isPlaying = true;
                    updatePlayPauseIcon(true);
                    updatePlayState(surahNum);
                    bar.classList.add('active');
                    return;
                } else {
                    player.playVideo();
                    isPlaying = true;
                    updatePlayPauseIcon(true);
                    bar.classList.add('active');
                    return;
                }
            }

            try {
                const surahName = surahList.find(s => s.number === surahNum)?.name || `سورة ${surahNum}`;
                info.textContent = `⏳ جاري تحميل ${surahName}...`;
                bar.classList.add('active');

                const success = await initPlayer(surahNum);
                if (success) {
                    setTimeout(() => {
                        if (player && player.playVideo && !isPlaying) {
                            player.playVideo();
                            isPlaying = true;
                            updatePlayPauseIcon(true);
                            updatePlayState(surahNum);
                            bar.classList.add('active');
                        }
                    }, 800);
                    document.querySelectorAll('.surah-nav-item .nav-play').forEach(el => {
                        const sNum = parseInt(el.dataset.surah);
                        if (sNum === surahNum) {
                            el.innerHTML = '<i class="fa-solid fa-volume-high" style="color:var(--gold);"></i>';
                        } else {
                            el.innerHTML = '<i class="fa-solid fa-play"></i>';
                        }
                    });
                    document.querySelectorAll('.btn-lg.play').forEach(el => {
                        el.dataset.surah = surahNum;
                        el.classList.add('playing');
                        const label = el.querySelector('span');
                        if (label) label.textContent = 'يتشغل';
                        const icon = el.querySelector('i');
                        if (icon) icon.className = 'fa-solid fa-spinner fa-pulse';
                    });
                } else {
                    info.textContent = '⚠️ فشل تحميل التلاوة';
                }
            } catch (e) {
                console.error('Play error:', e);
                info.textContent = '⚠️ تعذر تشغيل التلاوة';
                bar.classList.add('active');
            }
        }

        function closePlayer() {
            if (player && typeof player.pauseVideo === 'function') {
                player.pauseVideo();
            }
            isPlaying = false;
            stopProgressMonitoring();
            document.getElementById('playerBar').classList.remove('active');
            updatePlayPauseIcon(false);
            document.querySelectorAll('.btn-play, .btn-lg.play').forEach(el => {
                el.classList.remove('playing');
                const label = el.querySelector('span');
                if (label) label.textContent = 'استماع';
                const icon = el.querySelector('i');
                if (icon) icon.className = 'fa-solid fa-play';
            });
            document.querySelectorAll('.surah-nav-item .nav-play').forEach(el => {
                el.innerHTML = '<i class="fa-solid fa-play"></i>';
            });
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('currentTimeDisplay').textContent = '0:00';
            document.getElementById('durationDisplay').textContent = '0:00';
            document.getElementById('playerInfo').textContent = '⏹️ متوقف';
        }

        function updatePlayState(surahNum) {
            document.querySelectorAll('.btn-play, .btn-lg.play').forEach(el => {
                const isCurrent = parseInt(el.dataset.surah) === surahNum;
                if (isCurrent) {
                    el.classList.add('playing');
                    const label = el.querySelector('span');
                    if (label) label.textContent = 'يتشغل';
                    const icon = el.querySelector('i');
                    if (icon) icon.className = 'fa-solid fa-spinner fa-pulse';
                } else {
                    el.classList.remove('playing');
                    const label = el.querySelector('span');
                    if (label) label.textContent = 'استماع';
                    const icon = el.querySelector('i');
                    if (icon) icon.className = 'fa-solid fa-play';
                }
            });
            document.querySelectorAll('.surah-nav-item .nav-play').forEach(el => {
                const sNum = parseInt(el.dataset.surah);
                if (sNum === surahNum) {
                    el.innerHTML = '<i class="fa-solid fa-volume-high" style="color:var(--gold);"></i>';
                } else {
                    el.innerHTML = '<i class="fa-solid fa-play"></i>';
                }
            });
        }

        // ================================================================
        //  INDEX, LOAD SURAH, SEARCH, etc.
        // ================================================================
        async function loadIndex() {
            const grid = document.getElementById('surahGrid');
            const loading = document.getElementById('homeLoading');
            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await res.json();
                surahList = data.data;
                loading.style.display = 'none';
                renderSurahGrid();
                renderSidebar();
                loadYouTubeAPI();
            } catch (e) {
                loading.innerHTML = '⚠️ تعذر تحميل الفهرس. تأكد من اتصالك بالإنترنت.';
                console.error(e);
            }
        }

        function renderSurahGrid() {
            const grid = document.getElementById('surahGrid');
            grid.innerHTML = '';
            surahList.forEach(s => {
                const card = document.createElement('div');
                card.className = 'surah-card';
                const infoDiv = document.createElement('div');
                infoDiv.className = 'surah-info';
                infoDiv.onclick = () => loadSurah(s.number);
                infoDiv.innerHTML = `
                    <div class="num">${s.number}</div>
                    <div class="name">${s.name}</div>
                    <div class="meta">${s.numberOfAyahs} آية</div>
                `;
                const btnGroup = document.createElement('div');
                btnGroup.className = 'btn-group';
                const btnPlay = document.createElement('button');
                btnPlay.className = 'btn-sm btn-play';
                btnPlay.dataset.surah = s.number;
                btnPlay.innerHTML = `<i class="fa-solid fa-play"></i> استماع`;
                btnPlay.onclick = (e) => {
                    e.stopPropagation();
                    togglePlay(s.number);
                };
                const btnBenefits = document.createElement('button');
                btnBenefits.className = 'btn-sm btn-benefits';
                btnBenefits.innerHTML = `<i class="fa-solid fa-star"></i> فضائل`;
                btnBenefits.onclick = (e) => {
                    e.stopPropagation();
                    openBenefits(s.number);
                };
                btnGroup.appendChild(btnPlay);
                btnGroup.appendChild(btnBenefits);
                card.appendChild(infoDiv);
                card.appendChild(btnGroup);
                grid.appendChild(card);
            });
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = '';
            surahList.forEach(s => {
                const item = document.createElement('div');
                item.className = 'surah-nav-item';
                item.dataset.surah = s.number;
                item.innerHTML = `
                    <span>${s.number}. ${s.name}</span>
                    <span class="nav-play" data-surah="${s.number}" onclick="event.stopPropagation();togglePlay(${s.number});">
                        <i class="fa-solid fa-play"></i>
                    </span>
                `;
                item.onclick = () => loadSurah(s.number);
                nav.appendChild(item);
            });
        }

        function setActiveNav(surahId) {
            document.querySelectorAll('.surah-nav-item').forEach(el => el.classList.remove('active'));
            const target = document.querySelector(`.surah-nav-item[data-surah="${surahId}"]`);
            if (target) target.classList.add('active');
        }

        async function loadSurah(num) {
            currentSurah = num;
            showView('reading');
            setActiveNav(num);
            const container = document.getElementById('quranTextContainer');
            const loading = document.getElementById('quranLoading');
            const bismillah = document.getElementById('bismillahDisplay');
            const header = document.getElementById('surahHeader');
            const nameDisplay = document.getElementById('surahNameDisplay');
            const metaDisplay = document.getElementById('surahMetaDisplay');
            container.innerHTML = '';
            loading.style.display = 'block';
            header.style.display = 'none';
            bismillah.style.display = 'none';
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}/quran-uthmani`);
                const data = await res.json();
                const ayahs = data.data.ayahs;
                loading.style.display = 'none';
                const surahName = surahList.find(s => s.number === num)?.name || `سورة ${num}`;
                nameDisplay.textContent = surahName;
                metaDisplay.textContent = `${data.data.numberOfAyahs} آية • مكية / مدنية`;
                const playBtn = document.querySelector('.btn-lg.play');
                if (playBtn) {
                    playBtn.dataset.surah = num;
                    playBtn.classList.remove('playing');
                    const label = playBtn.querySelector('span');
                    if (label) label.textContent = 'استماع';
                    const icon = playBtn.querySelector('i');
                    if (icon) icon.className = 'fa-solid fa-play';
                }
                header.style.display = 'flex';
                if (num !== 1 && num !== 9) {
                    bismillah.style.display = 'block';
                }
                let html = '';
                ayahs.forEach((v, idx) => {
                    let text = v.text;
                    if (num !== 1 && idx === 0 && text.startsWith('بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ')) {
                        text = text.replace('بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ ', '');
                    }
                    html += `
                        <span class="verse-text">
                            ${text} <span class="verse-number">﴿${v.numberInSurah}﴾</span>
                        </span>
                    `;
                });
                container.innerHTML = html;
                document.getElementById('quranArea').scrollTop = 0;
            } catch (err) {
                loading.innerHTML = '❌ فشل تحميل السورة. حاول مجدداً.';
                console.error(err);
            }
        }

        function openBenefits(surahNum) {
            const modal = document.getElementById('benefitsModal');
            const title = document.getElementById('benefitsTitle');
            const body = document.getElementById('benefitsBody');
            const surahName = surahList.find(s => s.number === surahNum)?.name || `سورة ${surahNum}`;
            title.textContent = `🌟 فضائل سورة ${surahName}`;
            const benefitsText = SURAH_BENEFITS[surahNum];
            if (benefitsText) {
                body.innerHTML = benefitsText;
            } else {
                body.innerHTML = `
                    <div class="error-text">
                        ⚠️ لم نجد فضائل مذكورة لهذه السورة في هذه النسخة.<br>
                        <small>يمكنك البحث في كتب السنة والتفاسير.</small>
                    </div>
                `;
            }
            modal.classList.add('open');
        }

        function closeBenefits() {
            document.getElementById('benefitsModal').classList.remove('open');
        }
        document.getElementById('benefitsModal').addEventListener('click', function(e) {
            if (e.target === this) closeBenefits();
        });

        async function doSearch(query) {
            if (!query.trim()) return;
            showView('search');
            document.getElementById('headerSearchInput').value = query;
            document.getElementById('homeSearchInput').value = query;
            const container = document.getElementById('searchResults');
            const countEl = document.getElementById('searchCount');
            const loading = document.getElementById('searchLoading');
            container.innerHTML = '';
            loading.style.display = 'block';
            countEl.textContent = '';
            const direct = query.match(/^(\d{1,3})[: ](\d{1,3})$/);
            if (direct) {
                const s = parseInt(direct[1]);
                const v = parseInt(direct[2]);
                if (s >= 1 && s <= 114 && v > 0) {
                    loading.style.display = 'none';
                    await loadSurah(s);
                    setTimeout(() => {
                        const area = document.getElementById('quranArea');
                        const targets = area.querySelectorAll('.verse-text');
                        for (let el of targets) {
                            if (el.textContent.includes(`﴿${v}﴾`)) {
                                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                el.style.backgroundColor = '#e6f7f5';
                                setTimeout(() => el.style.backgroundColor = '', 3000);
                                break;
                            }
                        }
                    }, 600);
                    return;
                }
            }
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/search/${encodeURIComponent(query)}/all/quran-uthmani`);
                const data = await res.json();
                loading.style.display = 'none';
                if (data.code === 200 && data.data.count > 0) {
                    countEl.textContent = `🔎 ${data.data.count} نتيجة للبحث عن "${query}"`;
                    data.data.matches.forEach(m => {
                        const card = document.createElement('div');
                        card.className = 'result-card';
                        card.onclick = () => {
                            loadSurah(m.surah.number);
                            setTimeout(() => {
                                const area = document.getElementById('quranArea');
                                const targets = area.querySelectorAll('.verse-text');
                                for (let el of targets) {
                                    if (el.textContent.includes(`﴿${m.numberInSurah}﴾`)) {
                                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                        el.style.backgroundColor = '#e6f7f5';
                                        setTimeout(() => el.style.backgroundColor = '', 3000);
                                        break;
                                    }
                                }
                            }, 600);
                        };
                        const re = new RegExp(query, 'gi');
                        const highlighted = m.text.replace(re, match =>
                            `<span class="highlight">${match}</span>`);
                        card.innerHTML = `
                            <div class="head">
                                <span>${m.surah.name} (${m.surah.number})</span>
                                <span style="display:flex;gap:0.5rem;align-items:center;">
                                    <span>الآية ${m.numberInSurah}</span>
                                    <button onclick="event.stopPropagation();togglePlay(${m.surah.number})" style="background:var(--primary-light);color:var(--primary);border:none;padding:0.1rem 0.6rem;border-radius:20px;font-size:0.7rem;cursor:pointer;">
                                        <i class="fa-solid fa-play"></i>
                                    </button>
                                </span>
                            </div>
                            <div class="text">${highlighted}</div>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    countEl.textContent = `😓 لم نعثر على أي نتيجة لـ "${query}"`;
                }
            } catch (e) {
                loading.style.display = 'none';
                countEl.textContent = '⚠️ خطأ في الاتصال بخادم البحث';
                console.error(e);
            }
        }

        function showView(name) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${name}`).classList.add('active');
            if (name !== 'reading') document.body.classList.remove('mode-concentration');
        }

        function goHome() {
            showView('home');
            document.body.classList.remove('mode-concentration');
        }

        function toggleFocus() {
            document.body.classList.toggle('mode-concentration');
        }

        // ================================================================
        //  INIT
        // ================================================================
        loadIndex();

        document.getElementById('headerSearchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doSearch(this.value);
        });
        document.getElementById('homeSearchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doSearch(this.value);
        });

        setTimeout(() => {
            if (!playerReady) {
                loadYouTubeAPI();
            }
        }, 3000);

        console.log('🎵 المصحف الشريف مع التلاوة المباشرة لكل سورة');
        console.log(`📹 تم تحميل فيديوهات لـ ${Object.keys(SURAH_VIDEO_IDS).length} سورة`);
    </script>
</body>
</html>
